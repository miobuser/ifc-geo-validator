[server]
headless = true
port = 8501
enableCORS = false
# Real-world IFC retaining-wall models routinely exceed Streamlit's
# 200 MB default. 500 MB is a pragmatic compromise: covers ~95 % of
# infrastructure-scale projects without inviting DoS on a shared
# dyno. Operators with larger models should override this per-
# deployment (env var STREAMLIT_SERVER_MAX_UPLOAD_SIZE).
maxUploadSize = 500

# B+S corporate light theme (matches LayoutBSAG template)
[theme]
primaryColor = "#D70036"              # B+S red
backgroundColor = "#F8F7F5"           # warm off-white
secondaryBackgroundColor = "#FFFFFF"  # cards / sidebar
textColor = "#1C1C1E"                 # near-black
font = "sans serif"                   # DM Sans loaded via custom CSS in app

[browser]
gatherUsageStats = false
